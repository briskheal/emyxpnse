<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmyXpnse Secure Gateway</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      overflow-y: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 12px;
      height: 100vh;
    }
    .login-container {
      max-width: 420px;
      width: 100%;
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: var(--glass-shadow);
      z-index: 2;
      animation: scaleUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.1) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
    }
    .brand-section {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand-logo {
      font-size: 2.2rem;
      font-weight: 900;
      font-family: var(--font-brand);
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--color-indigo), var(--color-emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .brand-tagline {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      letter-spacing: 0.2px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 0.9rem;
      transition: all 0.25s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--color-indigo);
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
      background: rgba(255, 255, 255, 0.05);
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-family: var(--font-brand);
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--color-indigo), #4f46e5);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      margin-top: 10px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(99, 102, 241, 0.45);
      background: linear-gradient(135deg, #4f46e5, var(--color-indigo));
    }
    .btn-login:active {
      transform: translateY(0);
    }
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.5;
    }
    /* Toast notifications style rules */
    #toastContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .toast {
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      animation: slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .toast.success { border-color: var(--color-emerald); }
    .toast.error { border-color: #ef4444; }
    .toast.info { border-color: var(--color-indigo); }
  </style>
</head>
<body>

  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <!-- Toast system wrapper -->
  <div id="toastContainer"></div>

  <div class="login-container">
    <div class="brand-section">
      <div class="brand-logo">EMYXPNSE</div>
      <div class="brand-tagline">Corporate Expense Audit Gateway</div>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="loginId">Employee ID / Login ID</label>
        <input class="form-input" type="text" id="loginId" placeholder="e.g. admin or user" required autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Security Password</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••••••" required autocomplete="current-password">
      </div>

      <button class="btn-login" type="submit" id="btnSubmit">Sign In Securely</button>
    </form>

    <div class="login-footer">
      <span>Authorized Access Only</span><br>
      <span style="color: var(--text-muted); font-size: 0.7rem;">Protected by Emyris Secure Session Encryption</span>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const loginId = document.getElementById('loginId').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnSubmit');

      if (!loginId || !password) return;

      btn.disabled = true;
      btn.innerText = 'Verifying credentials...';

      try {
        // Submit authentication request to backend Express API
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ loginId, password })
        });

        const result = await response.json();

        if (response.ok && result.success) {
          showToast(`Welcome back, ${result.loginId}!`, 'success');
          
           // Save session locally to identify logged-in profile
          sessionStorage.setItem('emyxpnse_user_role', result.role);
          sessionStorage.setItem('emyxpnse_login_id', result.loginId);
          localStorage.setItem('emyxpnse_user_role', result.role);
          localStorage.setItem('emyxpnse_login_id', result.loginId);

          // Route intelligently by security roles
          setTimeout(() => {
            if (result.role === 'admin') {
              location.href = 'admin.html';
            } else {
              location.href = 'user.html';
            }
          }, 800);

        } else {
          showToast(result.error || 'Authentication failed.', 'error');
          btn.disabled = false;
          btn.innerText = 'Sign In Securely';
        }

      } catch (err) {
        console.warn('Backend unavailable, trying offline client fallback validation...');
        
        // Elite Offline-First Fallback: Allow direct mock validation if server is completely offline
        if (loginId === 'admin' && password === 'EMYXPNSE@2026') {
          showToast('Offline Mode: Admin authenticated.', 'success');
          sessionStorage.setItem('emyxpnse_user_role', 'admin');
          sessionStorage.setItem('emyxpnse_login_id', 'admin');
          localStorage.setItem('emyxpnse_user_role', 'admin');
          localStorage.setItem('emyxpnse_login_id', 'admin');
          setTimeout(() => { location.href = 'admin.html'; }, 800);
        } else if (loginId === 'user' && password === 'EMYXPNSE@2026') {
          showToast('Offline Mode: Employee authenticated.', 'success');
          sessionStorage.setItem('emyxpnse_user_role', 'user');
          sessionStorage.setItem('emyxpnse_login_id', 'user');
          localStorage.setItem('emyxpnse_user_role', 'user');
          localStorage.setItem('emyxpnse_login_id', 'user');
          setTimeout(() => { location.href = 'user.html'; }, 800);
        } else {
          showToast('Invalid offline credentials. Try: user / EMYXPNSE@2026', 'error');
          btn.disabled = false;
          btn.innerText = 'Sign In Securely';
        }
      }
    });

    // Simple toast controller
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      let icon = 'ℹ️';
      if (type === 'success') icon = '✅';
      if (type === 'error') icon = '❌';

      toast.innerHTML = `
        <span>${icon}</span>
        <span>${message}</span>
      `;
      container.appendChild(toast);

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        toast.style.transition = 'all 0.25s ease';
        setTimeout(() => {
          if (container.contains(toast)) container.removeChild(toast);
        }, 250);
      }, 3000);
    }

    // 📱 Register Offline PWA Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((reg) => console.log('PWA Service Worker registered successfully:', reg.scope))
          .catch((err) => console.warn('PWA Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
